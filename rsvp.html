<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP — Baby shower Silvana Coke Garzón</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;700&family=Comfortaa:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --pink-dk: #4a7c65;
    --pink-lt: #f0f5f2;
    --sage:    #c9ddd5;
    --sage-lt: #f4f8f6;
    --cream:   #f7f9f7;
    --ink:     #253028;
    --muted:   #6b8070;
    --border:  rgba(37,48,40,0.1);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

  .page { max-width: 520px; margin: 0 auto; padding: 2rem 1rem 4rem; }

  .back { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); text-decoration: none; margin-bottom: 1.5rem; }
  .back:hover { color: var(--pink-dk); }

  .event-card { background: white; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; margin-bottom: 1.5rem; }
  .event-header { background: var(--pink-lt); padding: 1.5rem; border-bottom: 1px solid var(--border); }
  .event-label { font-size: 12px; color: var(--pink-dk); letter-spacing: 3px; font-weight: 500; text-transform: uppercase; margin-bottom: 6px; }
  .event-name { font-family: 'Comfortaa', cursive; font-size: 22px; font-weight: 700; color: var(--ink); margin-bottom: 12px; }
  .event-details { display: flex; flex-direction: column; gap: 6px; }
  .event-detail { display: flex; align-items: flex-start; gap: 8px; font-size: 14px; color: var(--muted); }
  .event-detail span:first-child { font-size: 16px; flex-shrink: 0; }
  .event-body { padding: 1.25rem 1.5rem; }
  .menu-label { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .menu-item { font-size: 14px; color: var(--ink); padding: 4px 0; border-bottom: 1px solid var(--border); font-weight: 300; }
  .menu-item:last-child { border-bottom: none; }

  .form-card { background: white; border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; }
  .form-card h2 { font-family: 'Comfortaa', cursive; font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
  .form-card p { font-size: 14px; color: var(--muted); margin-bottom: 1.25rem; font-weight: 300; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase; }
  .field input { width: 100%; padding: 10px 14px; font-size: 15px; border: 1px solid var(--border); border-radius: 10px; background: var(--cream); color: var(--ink); font-family: 'Nunito', sans-serif; outline: none; transition: border-color .15s; }
  .field input:focus { border-color: var(--pink-dk); }
  .whatsapp-row { display: flex; gap: 8px; align-items: flex-end; }
  .whatsapp-row .field { flex: 1; margin-bottom: 0; }
  .wa-flag { font-size: 13px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--cream); color: var(--muted); white-space: nowrap; }
  .btn-confirm { width: 100%; padding: 12px; background: var(--pink-dk); color: white; border: none; border-radius: 12px; font-size: 15px; font-family: 'Nunito', sans-serif; font-weight: 500; cursor: pointer; margin-top: 4px; transition: opacity .15s; }
  .btn-confirm:hover { opacity: .85; }
  .btn-confirm:disabled { opacity: .5; cursor: default; }

  .success { text-align: center; padding: 2rem; }
  .success-icon { font-size: 48px; margin-bottom: 1rem; }
  .success h2 { font-family: 'Comfortaa', cursive; font-size: 22px; color: var(--pink-dk); margin-bottom: 8px; }
  .success p { font-size: 14px; color: var(--muted); font-weight: 300; line-height: 1.6; }

  .not-found { text-align: center; padding: 4rem 2rem; }
  .not-found h2 { font-family: 'Comfortaa', cursive; font-size: 20px; color: var(--ink); margin-bottom: 8px; }
  .not-found p { font-size: 14px; color: var(--muted); }

  .counter { text-align: center; margin-top: 1.5rem; }
  .counter-pill { display: inline-flex; align-items: center; gap: 8px; background: white; border: 1px solid var(--border); border-radius: 20px; padding: 8px 18px; font-size: 13px; color: var(--muted); }
  .counter-num { font-family: 'Comfortaa', cursive; font-size: 16px; font-weight: 700; color: var(--pink-dk); }
</style>
</head>
<body>
<div class="page">
  <a href="/" class="back">← Ver lista de regalos</a>
  <div id="content"><div style="text-align:center;padding:4rem;color:var(--muted);">Cargando...</div></div>
</div>

<script>
const SUPABASE_URL = 'https://jnubuqlcqxkvhzltwstp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpudWJ1cWxjcXhrdmh6bHR3c3RwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Nzg5NjAsImV4cCI6MjA5MDM1NDk2MH0.y_7yYry1HFfoAjPktT4TeVhQzulSUGLLUtGpgxVQ8UE';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const SHOWERS = {
  'amigos-david': {
    name: 'Shower amigos David',
    date: 'Sábado 9 de mayo, 2026 · 4:00 PM',
    location: 'Casa de Xime y David — Carrera 19A #104-16 Apto 401',
    menu: ['Paella marinera', 'Ensalada fresca', 'Pan artesanal', 'Postre']
  },
  'familia-fernandez': {
    name: 'Shower Familia Fernández',
    date: 'Sábado 16 de mayo, 2026 · 4:00 PM',
    location: 'Casa de Luz Amalia y Rocío — Carrera 22 #118-32',
    menu: ['Lomo de res en salsa de vino tinto y champiñones', 'Arroz pilaf con almendras', 'Ensalada de rúgula, pera y queso parmesano', 'Focaccia', 'Postre']
  },
  'gla': {
    name: 'Shower GLA',
    date: 'Sábado 30 de mayo, 2026 · 4:00 PM',
    location: 'Casa de Xime y David — Carrera 19A #104-16 Apto 401',
    menu: ['Paella marinera', 'Ensalada fresca', 'Pan artesanal', 'Postre']
  },
  'familia-garzon-rubio': {
    name: 'Shower Familia Garzón y Familia Rubio',
    date: 'Sábado 20 de junio, 2026 · 4:00 PM',
    location: 'Casa de Xime y David — Carrera 19A #104-16 Apto 401',
    menu: ['Lasagna mixta (carne y pollo)', 'Ensalada César', 'Pan de ajo', 'Postre']
  },
  'amigos-xime': {
    name: 'Shower amigos Xime',
    date: 'Sábado 4 de julio, 2026 · 4:00 PM',
    location: 'Casa de Xime y David — Carrera 19A #104-16 Apto 401',
    menu: ['Lasagna mixta (carne y pollo)', 'Ensalada César', 'Pan de ajo', 'Postre']
  }
};

const slug = window.location.pathname.replace('/rsvp/', '').replace('/', '');
const shower = SHOWERS[slug];

async function getRSVPCount() {
  const { count } = await db.from('rsvps').select('*', { count: 'exact', head: true }).eq('shower_slug', slug);
  return count || 0;
}

async function render() {
  const content = document.getElementById('content');
  if (!shower) {
    content.innerHTML = `<div class="not-found"><h2>Evento no encontrado</h2><p>Verifica el link que te compartieron.</p></div>`;
    return;
  }
  const count = await getRSVPCount();
  content.innerHTML = `
    <div class="event-card">
      <div class="event-header">
        <div class="event-label">Baby shower · Silvana Coke Garzón 🌿</div>
        <div class="event-name">${shower.name}</div>
        <div class="event-details">
          <div class="event-detail"><span>📅</span><span>${shower.date}</span></div>
          <div class="event-detail"><span>📍</span><span>${shower.location}</span></div>
        </div>
      </div>
      <div class="event-body">
        <div class="menu-label">Menú del evento</div>
        ${shower.menu.map(item => `<div class="menu-item">${item}</div>`).join('')}
      </div>
    </div>

    <div class="form-card" id="formCard">
      <h2>Confirma tu asistencia</h2>
      <p>¡Queremos saber que contaremos contigo en esta fecha especial!</p>
      <div class="field">
        <label>Tu nombre completo</label>
        <input type="text" id="rsvp-name" placeholder="Nombre y apellido" maxlength="80" />
      </div>
      <div class="field">
        <label>WhatsApp (opcional)</label>
        <div class="whatsapp-row">
          <div class="field">
            <input type="tel" id="rsvp-phone" placeholder="300 000 0000" maxlength="15" />
          </div>
          <div class="wa-flag">🇨🇴 +57</div>
        </div>
      </div>
      <button class="btn-confirm" id="btnRSVP" onclick="submitRSVP()">Confirmar asistencia ✓</button>
    </div>

    <div class="counter">
      <div class="counter-pill">
        <span class="counter-num" id="rsvp-count">${count}</span>
        <span>${count === 1 ? 'persona confirmada' : 'personas confirmadas'}</span>
      </div>
    </div>`;
}

async function submitRSVP() {
  const name = document.getElementById('rsvp-name').value.trim();
  const phone = document.getElementById('rsvp-phone').value.trim();
  if (!name) { document.getElementById('rsvp-name').style.borderColor = '#e24b4a'; return; }
  const btn = document.getElementById('btnRSVP');
  btn.disabled = true;
  btn.textContent = 'Confirmando...';
  const { error } = await db.from('rsvps').insert({
    shower_slug: slug,
    shower_name: shower.name,
    name,
    phone: phone ? `+57${phone.replace(/\s/g,'')}` : null,
  });
  if (error) { btn.disabled = false; btn.textContent = 'Confirmar asistencia ✓'; alert('Hubo un error. Intenta de nuevo.'); return; }
  document.getElementById('formCard').innerHTML = `
    <div class="success">
      <div class="success-icon">🌿</div>
      <h2>¡Nos vemos ahí!</h2>
      <p>Tu asistencia al <strong>${shower.name}</strong> está confirmada.<br>El <strong>${shower.date}</strong>.<br><br>¡Silvana ya tiene ganas de conocerte!</p>
    </div>`;
  const newCount = await getRSVPCount();
  document.getElementById('rsvp-count').textContent = newCount;
}

render();
</script>
</body>
</html>
